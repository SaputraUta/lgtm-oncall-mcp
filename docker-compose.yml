# Local dev environment — Grafana + Mimir + Loki, plus a sample app emitting
# /metrics and logs. Lets you try the MCP server end-to-end without an AWS account.
#
# Usage:
#   docker compose up -d
#   open http://localhost:3000        (Grafana — anonymous viewer)
#   # then in another shell:
#   set -a; source .env.docker; set +a
#   python -m lgtm_oncall_mcp

services:

  mimir:
    image: grafana/mimir:2.13.0
    container_name: lgtm-mimir
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./examples/docker/mimir.yaml:/etc/mimir/mimir.yaml:ro
    ports:
      - "9009:9009"
    networks: [lgtm]

  loki:
    image: grafana/loki:3.1.0
    container_name: lgtm-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    networks: [lgtm]

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: lgtm-grafana
    depends_on: [mimir, loki]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./examples/docker/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - "3000:3000"
    networks: [lgtm]

  # Sample app emitting Prometheus metrics — lets you actually see CPU/RAM
  # numbers come back when you call the MCP tools.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: lgtm-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    networks: [lgtm]

networks:
  lgtm:
    driver: bridge
